# Staging Environment Properties
api.base.url=https://staging-api.example.com
api.payment.endpoint=/api/payment/request
app.name=Bit Payment API Staging

# Payment endpoint for staging environment
payment.endpoint=/api/payment/request

# AWS SQS Configuration for staging
sqs.queue.url=https://sqs.region.amazonaws.com/account-id/queue-name-staging
sqs.region=us-east-1
sqs.retry.max.attempts=3
sqs.retry.delay.ms=1000

# UI Test Configuration
app.url=https://staging.example.com/approval
app.browser=CHROME
app.timeout.seconds=15

# Logging
log.level=INFO