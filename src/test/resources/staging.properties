# API Configuration (DEV)
# ============================================
api.base.url=http://bit.staging:8080
app.name=Bit Payment API Staging


# ============================================
# Android Appium UI Test Configuration (DEV)
# ============================================

# Android App Configuration
app.package=com.example.approvalapp.staging
app.activity=.MainActivity
app.type=native

# Path to APK file
# For staging: use dev build APK
app.path=src/test/resources/app/app-staging.apk

# ============================================
# Android Device Configuration (DEV)
# ============================================

# Device Name/ID (different emulator for dev)
app.device.name=emulator-5556

# Android Version
app.device.version=14

# ============================================
# Appium Server Configuration (DEV)
# ============================================

# Appium Server URL (local)
appium.server.url=http://bit.staging:4723

# SQS Queue URL for staging environment
sqs.queue.url=https://sqs.us-east-1.amazonaws.com/ACCOUNT-ID/queue-name-staging
sqs.region=us-east-1
sqs.retry.max.attempts=3
sqs.retry.delay.ms=1000

# AWS Credentials are injected from Jenkins secrets via Maven properties:
# - aws.access.key.id (from Jenkins secret: aws-access-key-staging)
# - aws.secret.access.key (from Jenkins secret: aws-secret-key-staging)