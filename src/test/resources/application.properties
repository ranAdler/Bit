# ============================================
# DEFAULT PROPERTIES (Spring Fallback)
# ============================================
# This file serves as default configuration
# Specific profiles (test, dev, prod) override these values
# Run: mvn test (uses test.properties)
# Run: mvn test -Dspring.profiles.active=dev (uses dev.properties)

# ============================================
# API Configuration (DEFAULT)
# ============================================
api.base.url=http://localhost:8080
api.payment.endpoint=/api/payment/request
app.name=Bit Payment API Test
payment.endpoint=/api/payment/request

# ============================================
# Android Appium UI Test Configuration (DEFAULT)
# ============================================

# Android App Configuration
app.package=com.example.approvalapp
app.activity=.MainActivity
app.type=native

# Path to APK file
# Default: uses test app APK
app.path=src/test/resources/app/app-debug.apk

# ============================================
# Android Device Configuration (DEFAULT)
# ============================================

# Device Name/ID
# Default: local emulator
app.device.name=emulator-5554

# Android Version
# Default: Android 13
app.device.version=13

# ============================================
# Appium Server Configuration (DEFAULT)
# ============================================

# Appium Server URL
appium.server.url=http://localhost:4723

# Timeout for commands (seconds)
appium.server.timeout=60

# ============================================
# AWS SQS Configuration (DEFAULT)
# ============================================

# SQS Queue URL (default configuration)
sqs.queue.url=https://sqs.us-east-1.amazonaws.com/ACCOUNT-ID/queue-name

# AWS Region
sqs.region=us-east-1

# AWS Credentials (injected from Jenkins secrets, NOT in properties files)
# aws.access.key.id=<injected via Jenkins withCredentials()>
# aws.secret.access.key=<injected via Jenkins withCredentials()>

# SQS Retry Configuration
sqs.retry.max.attempts=3
sqs.retry.delay.ms=1000

# ============================================
# Logging Configuration (DEFAULT)
# ============================================

# Log Level (INFO, DEBUG, WARN, ERROR)
log.level=INFO

# ============================================
# Locale/Language Configuration (DEFAULT)
# ============================================

# Language and Locale Setting
language=he_IL